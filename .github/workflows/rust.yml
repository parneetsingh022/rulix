name: Rust CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest
          - macos-latest

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache dependencies
        uses: Swatinem/rust-cache@v2

      - name: Check formatting
        if: matrix.os == 'ubuntu-latest'
        run: cargo fmt --all -- --check

      - name: Run Clippy
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings

      - name: Run tests
        run: cargo test --workspace --all-features --verbose

  cross-device:
    needs: test
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache dependencies
        uses: Swatinem/rust-cache@v2

      - name: Linux cross-device move test
        if: runner.os == 'Linux'
        run: |
          sudo mkdir -p /mnt/move-dst
          sudo mount -t tmpfs tmpfs /mnt/move-dst
          mkdir -p "$RUNNER_TEMP/move-src"
          MOVE_TEST_SRC="$RUNNER_TEMP/move-src" MOVE_TEST_DST="/mnt/move-dst" cargo test -p undo-fs cross_device -- --ignored --nocapture

      - name: Windows cross-drive move test
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Get-PSDrive -PSProvider FileSystem

          if (!(Test-Path C:\) -or !(Test-Path D:\)) {
            Write-Host "C:\ or D:\ not available; skipping cross-drive test"
            exit 0
          }

          New-Item -ItemType Directory -Force "C:\move-src"
          New-Item -ItemType Directory -Force "D:\move-dst"

          $env:MOVE_TEST_SRC = "C:\move-src"
          $env:MOVE_TEST_DST = "D:\move-dst"
          cargo test -p undo-fs cross_device -- --ignored --nocapture